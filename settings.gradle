    fun getDailyQuestions(): List<Question> {
        val cal = java.util.Calendar.getInstance()
        val seed = (cal.get(java.util.Calendar.YEAR) * 1000L
                + cal.get(java.util.Calendar.DAY_OF_YEAR))
        val r = java.util.Random(seed)
        return all.shuffled(r).take(5)
    }

    fun getPracticeQuestions(count: Int): List<Question> {
        val actualCount = minOf(count, all.size)
        return all.shuffled().take(actualCount)
    }
